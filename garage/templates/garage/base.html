{% load static %}

<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ورشة السيارات</title>

  <link rel="stylesheet" href="{% static 'fonts/fonts.css' %}">

<!-- Local Bootstrap RTL -->
<link rel="stylesheet" href="{% static 'css/bootstrap.rtl.min.css' %}">

<!-- Local Bootstrap JS -->
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  

  <style>
    :root {
      --ink: #0b0b0b;                 /* black */
      --muted: #6b7280;
      --brand: #d10000;               /* red */
      --brand-2: #b00000;             /* darker red */
      --surface: #ffffff;             /* white */
      --surface-soft: rgba(255, 255, 255, 0.85);
      --ring: rgba(209, 0, 0, 0.25);
      --dark: #0b0b0b;
    }

    body {
      font-family: "Cairo", "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(900px 500px at 10% -10%, rgba(209, 0, 0, 0.16), transparent),
        radial-gradient(800px 420px at 90% 0%, rgba(11, 11, 11, 0.10), transparent),
        #f3f5f7;
    }

    a { text-decoration: none; color: inherit; }

    /* Navbar */
    .app-nav {
      backdrop-filter: blur(10px);
      background: rgba(11, 11, 11, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.20);
    }
    .app-nav .navbar-brand {
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--surface);
    }
    .app-nav .nav-link {
      color: rgba(255, 255, 255, 0.88) !important;
      font-weight: 600;
    }
    .app-nav .nav-link:hover,
    .app-nav .nav-link:focus {
      color: var(--brand) !important;
    }

    /* Fix toggler icon visibility on dark bg */
    .navbar-toggler {
      border-color: rgba(255,255,255,0.25);
    }
    .navbar-toggler-icon {
      filter: invert(1);
    }

    .app-shell { max-width: 1100px; }

    .app-hero {
      background: linear-gradient(120deg, rgba(209, 0, 0, 0.10), rgba(11, 11, 11, 0.06));
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 24px;
      padding: 24px;
      margin-top: 18px;
    }

    h2, h3 { font-weight: 700; }

    .card {
      border: 0;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.10);
    }
    .card + .card { margin-top: 16px; }

    .muted { color: var(--muted); }

    .warn {
      background: rgba(209, 0, 0, 0.06);
      border-radius: 12px;
      border: 1px solid rgba(209, 0, 0, 0.25);
    }

    .table {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.10);
    }
    .table th {
      background: rgba(0, 0, 0, 0.04);
      font-weight: 600;
    }

    /* Forms */
    .form-modern input,
    .form-modern select,
    .form-modern textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      background: rgba(255, 255, 255, 0.95);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .form-modern input:focus,
    .form-modern select:focus,
    .form-modern textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .form-modern button {
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(209, 0, 0, 0.25);
    }
    .form-modern button:hover { filter: brightness(1.05); }

    .form-modern p { margin-bottom: 16px; }

    .form-modern label {
      font-weight: 700;
      margin-bottom: 6px;
      display: inline-block;
    }

    /* Badge */
    .badge-soft {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(209, 0, 0, 0.10);
      color: var(--brand);
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* Action links */
    .action-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      background: #fff;
      font-weight: 700;
    }
    .action-links a:last-child {
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      color: #fff;
      border: none;
    }

    /* Optional: make bootstrap primary match brand red if you use btn-primary/text-primary */
    .btn-primary, .bg-primary, .badge.bg-primary {
      background-color: var(--brand) !important;
      border-color: var(--brand) !important;
    }
    .btn-primary:hover, .btn-primary:focus {
      background-color: var(--brand-2) !important;
      border-color: var(--brand-2) !important;
    }
    .text-primary, .link-primary {
      color: var(--brand) !important;
    }
    .border-primary {
      border-color: var(--brand) !important;
    }

    .btn-outline-primary{
    color: var(--brand) !important;
    border-color: var(--brand) !important;
    }
  .btn-outline-primary:hover,
  .btn-outline-primary:focus{
    background-color: var(--brand) !important;
    border-color: var(--brand) !important;
    color: #fff !important;
  }

  /* Nav pills theme (red) */
.nav-pills .nav-link {
  color: var(--dark);
  border: 1px solid rgba(0,0,0,0.12);
  background: rgba(255,255,255,0.9);
  font-weight: 700;
}
.nav-pills .nav-link.active,
.nav-pills .show > .nav-link {
  background: var(--brand) !important;
  border-color: var(--brand) !important;
  color: #fff !important;
}
.nav-pills .nav-link:hover {
  border-color: var(--brand);
  color: var(--brand);
}
  </style>
</head>

<body>
  <div class="container app-shell py-4">
    <nav class="navbar navbar-expand-lg app-nav px-3 py-2">
      <div class="container-fluid px-0">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
          <img src="{% static 'images/logo.jpeg' %}" style="width:65px;height:65px;border-radius:10px;">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 w-100 justify-content-start">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'home' %}">الرئيسية</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'accounting_dashboard' %}">الحسابات</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'client_list' %}">العملاء</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'car_list' %}">السيارات</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'workers_list' %}">الفنيين</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="app-hero">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div>
          <div class="badge-soft mb-2">لوحة الورشة</div>
          <h1 class="h3 mb-0">إدارة صيانة السيارات بسهولة</h1>
          <div class="muted mt-2">تابع العملاء والسيارات وسجل الصيانة بوضوح.</div>
        </div>
      </div>
    </div>

    <div class="mt-4">
      {% block content %}{% endblock %}
    </div>
  </div>

</body>
</html>
