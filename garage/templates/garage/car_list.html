{% extends "garage/base.html" %}
{% block content %}

<h2 class="mb-3">السيارات (آخر 300)</h2>

<div class="table-responsive">
  <table class="table table-striped table-hover align-middle">
    <thead>
      <tr>
        <th>VIN</th>
        <th>رقم اللوحة</th>
        <th>العميل</th>
        <th>KM</th>
        <th></th>
      </tr>
    </thead>

    <tbody>
      {% for car in cars %}
        <tr>
          <td>{{ car.vin }}</td>
          <td>{{ car.plate_number }}</td>
          <td>{{ car.client.name }}</td>
          <td>{{ car.current_km }}</td>
          <td>
            <a class="btn btn-sm btn-primary" href="{% url 'car_detail' car.vin %}">
              عرض
            </a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
