{% extends "garage/base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">العملاء</h2>

  <a href="{% url 'client_create' %}" class="btn btn-primary">
    + إضافة عميل
  </a>
</div>

<form method="get" class="row g-2 align-items-center mb-3">
  <div class="col-md-4">
    <input
      type="text"
      name="q"
      value="{{ q|default:'' }}"
      class="form-control"
      placeholder="ابحث برقم الموبايل"
      autocomplete="off"
    >
  </div>

  <div class="col-auto d-flex gap-2">
    <button class="btn btn-outline-primary">بحث</button>
    <!-- make reset black -->
    <a class="btn btn-dark" href="{% url 'client_list' %}">مسح</a>
  </div>
</form>

<div class="table-responsive">
  <table class="table table-striped table-hover align-middle">
    <thead>
      <tr>
        <th>الاسم</th>
        <th>رقم الهاتف</th>
        <th></th>
      </tr>
    </thead>

    <tbody>
      {% for c in clients %}
        <tr>
          <td>{{ c.name }}</td>
          <td>{{ c.phone }}</td>
          <td class="action-links">
            <a href="{% url 'client_edit' c.id %}">تعديل</a>

            <!-- changed from green success to red primary + fixed variable -->
            <a href="{% url 'car_create' %}?client={{ c.id }}"
               class="btn btn-sm btn-primary">
              إضافة سيارة
            </a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
